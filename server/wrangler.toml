name = "balloon-multiplayer-public"
main = "src/index.js"
compatibility_date = "2026-07-01"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# SQLite保存方式のDOにする(無料プランでDurable Objectsを使うための必須条件)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# 公開版は同時飛行4機まで(サーバー負荷低減のため。将来的にサーバーを増強し次第、上限は緩和する予定)
[vars]
MAX_PLAYERS = "4"
